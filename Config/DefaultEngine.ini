; DefaultEngine.ini - 生物母巢进化游戏引擎配置
; UE5 Nanite + Lumen 项目配置

[/Script/Engine.RendererSettings]
; 启用Nanite虚拟几何体
r.Nanite=1
; 启用Lumen全局光照
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.ScreenProbeGather=1
; 虚拟纹理
r.VirtualTextures=1
r.VT.EnableFeedbackFactor=1
; 网格距离场
r.GenerateMeshDistanceFields=1
; 动态天空光照
r.SkyLight.RealTimeReflectionCapture=1
; 光线追踪阴影（可选，需要RT硬件）
r.RayTracing=0
r.RayTracing.Shadows=0

[/Script/Engine.Engine]
; DPI缩放
GlobalHighResolutionMouse=1

[/Script/HardwareTargeting.HardwareTargetingSettings]
; 目标硬件等级
TargetedHardwareClass=Desktop
AppliedTargetedHardwareClass=Desktop
DefaultGraphicsPerformance=Maximum
AppliedDefaultGraphicsPerformance=Maximum

[/Script/WindowsTargetPlatform.WindowsTargetSettings]
; 构建配置
DefaultGraphicsRHI=DefaultGraphicsRHI_DX12
DefaultGraphicsRHI=DX12 USE IF DX12 IS SUPPORTED BY HARDWARE

[/Script/Engine.GameEngine]
; 最大FPS
MaxFPS=144
bUseFixedFrameRate=False

[/Script/Engine.InputSettings]
; 鼠标属性
bEnableMouseSmoothing=True
bDefaultViewportMouseLock=False
bDefaultViewportMouseCapture=False

[/Script/Engine.UserInterfaceSettings]
; UI缩放
bAllowHighDPIInGameMode=True
ApplicationScale=1.0
FontDPIPreset=Standard
RenderFocusRule=Always

[/Script/Engine.AISystem]
; AI更新频率
NavigationSystemConfigOverride=None

[/Script/NavigationSystem.NavigationSystemV1]
; 导航网格精度
FIXED_TURN_RATE_SPEED=100.0

; 游戏配置
[/Script/BioHive.BioHiveGameMode]
; 母巢升级消耗
HiveUpgradeCosts=(0,500,1000,2000,5000,10000)
MaxPopulationPerLevel=(0,20,40,60,100,200)
MaxHiveLevel=5
